<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasane Teto</title>
    
    <link rel="icon" href="img/kasane-teto-teto.png" type="image/gif">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <a href="index.html">
            <img class="logo" src="img/teto-kasane.gif" alt="Logo da Teto Kasane">
        </a>
        <ul class="menu">
            <li><a href="index.html">home</a></li>
            <li><a href="Videos.html">videos</a></li>
            <li><a href="fanarts.html">fanarts</a></li>
        </ul>
    </header>

    <main class="container">
        <section class="historia"> <h1>Galeria de Fanarts</h1>
            <p>Explore a criatividade da comunidade! A Kasane Teto possui designs incríveis feitos por artistas do mundo todo.</p>

            <div class="galeria-grid">
                <div class="fanart-card">
                    <img src="img/a691d863364de64b7cdabaf58d577a72.jpg" alt="Fanart da Teto">
                    <div class="fanart-info">
                        <span>pinterest</span>
                    </div>
                </div>

                <div class="fanart-card">
                    <img src="img/kasane-teto-fanart-from-the-song-spoken-for-v0-yghngu79mjgf1.webp" alt="Fanart da Teto">
                    <div class="fanart-info">
                        <span>pinterest</span>
                    </div>
                </div>

                <div class="fanart-card">
                    <img src="img/2370410b8acc2ffc95e1991c8a5a1b4c.jpg" alt="Fanart da Teto">
                    <div class="fanart-info">
                        <span>pinterest</span>
                    </div>
                </div>

                <div class="fanart-card">
                    <img src="img/418f057d0349c7096db41fb77cb275c0.jpg" alt="Fanart da Teto">
                    <div class="fanart-info">
                        <span>pinterest</span>
                    </div>
                </div>

                <div class="fanart-card">
                    <img src="img/2a9a49cfc7d99eb052a7e6212f2a4e35.jpg" alt="Fanart da Teto">
                    <div class="fanart-info">
                        <span>pinterest</span>
                    </div>
                </div>

                <div class="fanart-card">
                    <img src="img/3130f2ffb8f3c5a747a2d35f358d4958.jpg" alt="Fanart da Teto">
                    <div class="fanart-info">
                        <span>pinterest</span>
                    </div>
                </div>

                </div>
        </section>
    </main>

    <audio id="meuAudio">
        <source src="img/teto-wav.mp3" type="audio/mpeg">

    </audio>
    <audio id="audioLogo">
        <source src="img/teto-word-of-the-day-made-with-voicemod-1_VcMLAVJ9.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('meuAudio');
        const audioLogo = document.getElementById('audioLogo');
        const cards = document.querySelectorAll('.video-card');
        const menuLinks = document.querySelectorAll('.menu a');
        const logoLink = document.querySelector('header a');

        cards.forEach(card => {
            card.addEventListener("click", () => {
                audio.currentTime = 0;
                audio.play();
            });
        });

        logoLink.addEventListener("click", (event) => {
            event.preventDefault();
            audioLogo.currentTime = 0;
            audioLogo.play();
            setTimeout(() => {
                window.location.href = logoLink.href;
            }, 2000);
        });
        menuLinks.forEach(link => {
            link.addEventListener("click", (event) => {
                event.preventDefault();
                audio.currentTime = 0;
                audio.play();
                setTimeout(() => {
                    window.location.href = link.href;
                }, 800);
            });
        });
    </script>

</body>

</html>
